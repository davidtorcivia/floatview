<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FloatView</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="ambient-bg"></div>
    <div class="container">
        <div class="header">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24">
                    <path d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" />
                </svg>
            </div>
            <h1>FloatView</h1>
            <p class="subtitle">Floating browser window for streaming media</p>
        </div>

        <div class="input-group">
            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="2" y1="12" x2="22" y2="12"></line>
                <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            <input type="text" class="url-input" id="url-input" placeholder="Enter URL (e.g., http://192.168.1.XXX:8096)" autofocus>
        </div>

        <button class="btn" id="go-btn">
            Launch Stream
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>

        <div class="shortcuts">
            <h3>Keyboard Shortcuts</h3>
            <div class="shortcut-grid">
                <div class="shortcut">
                    <span>Toggle always on top</span>
                    <div class="kbd-group">
                        <kbd>Alt</kbd><kbd>Shift</kbd><kbd>T</kbd>
                    </div>
                </div>
                <div class="shortcut">
                    <span>Toggle click-through</span>
                    <div class="kbd-group">
                        <kbd>Alt</kbd><kbd>Shift</kbd><kbd>D</kbd>
                    </div>
                </div>
                <div class="shortcut">
                    <span>Adjust opacity</span>
                    <div class="kbd-group">
                        <kbd>Alt</kbd><kbd>Shift</kbd><kbd>↑/↓</kbd>
                    </div>
                </div>
                <div class="shortcut">
                    <span>Show/hide window</span>
                    <div class="kbd-group">
                        <kbd>Alt</kbd><kbd>Shift</kbd><kbd>H</kbd>
                    </div>
                </div>
                <div class="shortcut">
                    <span>Play/pause media</span>
                    <div class="kbd-group">
                        <kbd>Alt</kbd><kbd>Shift</kbd><kbd>P</kbd>
                    </div>
                </div>
                <div class="shortcut">
                    <span>Skip forward/back</span>
                    <div class="kbd-group">
                        <kbd>Alt</kbd><kbd>Shift</kbd><kbd>→/←</kbd>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
